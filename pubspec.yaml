name: etc
description: "Emotion Trash Can"

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 데이터 처리 및 입출력 (호환성 우선 버전)
  http: ^1.2.0
  csv: ^6.0.0
  path_provider: ^2.1.2
  share_plus: ^12.0.1    # sdk 3.10에 안정적인 버전
  file_picker: ^10.3.10

  # 데이터베이스 및 저장소
  hive: ^2.2.3

  # 위젯추가. 약먹어라고 존나 나대기.
  hive_flutter: ^1.1.0

  path: ^1.9.0
  uuid: ^4.4.0

  sqflite: ^2.3.0
  # 윈도우/데스크톱 환경을 위한 FFI 패키지 (이것을 추가하세요)
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.24  # 윈도우용 SQLite 라이브러리 포함

  # UI 및 차트
  home_widget: ^0.9.0
  fl_chart: ^1.1.1      # 1.x는 최신 SDK 요구함
  syncfusion_flutter_charts: ^32.2.5
  cupertino_icons: ^1.0.8
  intl: ^0.20.2          # sdk 호환성 높음
  table_calendar: ^3.1.2

  # 웹뷰 (다크모드 지원 조합)
  webview_flutter: ^4.8.0
  webview_flutter_android: ^4.10.11
  webview_flutter_wkwebview: ^3.10.2

  # 상태 관리
  flutter_riverpod: ^3.2.1 # 3.x는 아직 실험적이며 SDK 버전 많이 탐

  # 이미지
  image_picker: ^1.1.2

  # 구글계정사용 구글 드라이브
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.0

  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0  # sdk 3.10에 맞는 린트
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/images/app_icon.png"
